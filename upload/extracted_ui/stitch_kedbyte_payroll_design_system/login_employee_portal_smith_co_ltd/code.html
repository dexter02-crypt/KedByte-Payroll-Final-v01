<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Employee Portal | Smith &amp; Co Ltd</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    :root {
      --void-bg: #0C0C0E;
      --pearl-accent: #E8E4E0;
    }
    body {
      background-color: var(--void-bg);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .pearl-focus:focus-within label {
      color: var(--pearl-accent);
    }
    .pearl-focus:focus-within .input-line {
      background-color: var(--pearl-accent);
      transform: scaleX(1);
    }
    .input-line {
      transition: transform 0.3s ease, background-color 0.3s ease;
      transform: scaleX(0.4);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-primary-fixed": "#1c1b19",
                  "error": "#ffb4ab",
                  "primary-fixed": "#e6e2de",
                  "tertiary": "#ffffff",
                  "surface-container-highest": "#363434",
                  "on-tertiary-fixed": "#1d1b1d",
                  "on-surface-variant": "#cac6bd",
                  "inverse-primary": "#605e5b",
                  "secondary-container": "#474649",
                  "outline-variant": "#484740",
                  "surface": "#141313",
                  "on-secondary-fixed": "#1b1b1d",
                  "on-primary": "#31302e",
                  "on-tertiary": "#323031",
                  "on-surface": "#e5e2e1",
                  "surface-bright": "#3a3938",
                  "inverse-surface": "#e5e2e1",
                  "background": "#0C0C0E",
                  "surface-dim": "#141313",
                  "surface-container": "#201f1f",
                  "on-tertiary-container": "#676365",
                  "on-primary-container": "#666461",
                  "secondary-fixed-dim": "#c8c6c8",
                  "on-error": "#690005",
                  "surface-tint": "#c9c6c2",
                  "secondary-fixed": "#e5e1e4",
                  "tertiary-fixed-dim": "#cac5c7",
                  "on-tertiary-fixed-variant": "#494648",
                  "surface-container-low": "#1c1b1b",
                  "surface-container-high": "#2b2a29",
                  "on-secondary": "#313032",
                  "secondary": "#c8c6c8",
                  "outline": "#939188",
                  "error-container": "#93000a",
                  "tertiary-fixed": "#e7e1e3",
                  "primary": "#ffffff",
                  "tertiary-container": "#e7e1e3",
                  "on-background": "#e5e2e1",
                  "inverse-on-surface": "#313030",
                  "on-secondary-fixed-variant": "#474649",
                  "surface-container-lowest": "#0f0e0e",
                  "primary-container": "#e6e2de",
                  "on-primary-fixed-variant": "#484744",
                  "surface-variant": "#363434",
                  "on-error-container": "#ffdad6",
                  "on-secondary-container": "#b7b4b7",
                  "primary-fixed-dim": "#c9c6c2"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "row-height": "48px",
                  "rail-width": "48px",
                  "element-gap": "12px",
                  "section-gap": "32px",
                  "container-gap": "64px",
                  "command-height": "44px"
          },
          "fontFamily": {
                  "section-title": ["Inter"],
                  "page-title": ["Inter"],
                  "label-caps": ["Inter"],
                  "data-sm": ["JetBrains Mono"],
                  "data-lg": ["JetBrains Mono"],
                  "body-main": ["Inter"]
          },
          "fontSize": {
                  "section-title": ["13px", {"lineHeight": "16px", "letterSpacing": "0.06em", "fontWeight": "500"}],
                  "page-title": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                  "label-caps": ["11px", {"lineHeight": "14px", "letterSpacing": "0.08em", "fontWeight": "600"}],
                  "data-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0px", "fontWeight": "500"}],
                  "data-lg": ["28px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "body-main": ["15px", {"lineHeight": "24px", "letterSpacing": "0px", "fontWeight": "400"}]
          }
        },
      },
    }
  </script>
</head>
<body class="bg-background text-on-background font-body-main">
<main class="w-full max-w-[360px] flex flex-col items-center px-6">
<!-- Logo & Identity Section -->
<header class="flex flex-col items-center w-full mb-12">
<!-- The Pearl Circle -->
<div class="w-12 h-12 rounded-full bg-[#141416] border border-white/5 flex items-center justify-center mb-4 transition-transform duration-700 hover:scale-105">
<span class="font-semibold text-[16px] text-[#E8E4E0] tracking-tight">SC</span>
</div>
<h1 class="text-[14px] font-medium text-[#F5F5F5] mb-4 text-center">
        Smith &amp; Co Ltd Employee Portal
      </h1>
<!-- Minimalist Divider -->
<div class="w-8 h-[1px] bg-[#E8E4E0] mb-4"></div>
<p class="text-[13px] text-[#A1A1AA] text-center">
        Sign in with your work email
      </p>
</header>
<!-- Sign In Form -->
<section class="w-full space-y-8">
<!-- Email Input -->
<div class="pearl-focus group flex flex-col space-y-2 relative">
<label class="text-[10px] uppercase tracking-widest text-[#A1A1AA] transition-colors duration-300" for="email">
          Email
        </label>
<div class="relative">
<input autocomplete="email" class="w-full h-[48px] bg-transparent border-0 border-b border-white/10 px-0 text-on-background focus:ring-0 focus:border-b-transparent transition-all duration-300 placeholder:text-zinc-800" id="email" placeholder="name@smithandco.com" type="email"/>
<div class="input-line absolute bottom-0 left-0 w-full h-[1px] bg-zinc-700 origin-center"></div>
</div>
</div>
<!-- Password Input -->
<div class="pearl-focus group flex flex-col space-y-2 relative">
<label class="text-[10px] uppercase tracking-widest text-[#A1A1AA] transition-colors duration-300" for="password">
          Password
        </label>
<div class="relative flex items-center">
<input class="w-full h-[48px] bg-transparent border-0 border-b border-white/10 px-0 text-on-background focus:ring-0 focus:border-b-transparent transition-all duration-300 pr-10" id="password" type="password"/>
<button class="absolute right-0 text-[#A1A1AA] hover:text-[#F5F5F5] transition-colors p-2" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
</button>
<div class="input-line absolute bottom-0 left-0 w-full h-[1px] bg-zinc-700 origin-center"></div>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[48px] bg-[#E8E4E0] text-[#0C0C0E] font-semibold text-[14px] hover:bg-white transition-all duration-300 active:scale-[0.98] mt-2">
        Sign In
      </button>
<!-- Links -->
<div class="flex flex-col items-center space-y-6 pt-4">
<a class="text-[13px] text-[#A1A1AA] hover:text-[#F5F5F5] transition-colors" href="#">
          Forgot password?
        </a>
<div class="flex items-center w-full space-x-4">
<div class="flex-grow h-[1px] bg-white/[0.04]"></div>
<span class="text-[11px] text-zinc-600 font-data-sm uppercase tracking-tighter">or</span>
<div class="flex-grow h-[1px] bg-white/[0.04]"></div>
</div>
<p class="text-[13px] text-[#A1A1AA] text-center leading-relaxed">
          First time here? <br/>
<a class="text-[#F5F5F5] hover:underline underline-offset-4 transition-all" href="#">Activate your account</a>
</p>
</div>
</section>
<!-- Footer Information -->
<footer class="fixed bottom-12 w-full max-w-[360px] flex flex-col items-center">
<div class="opacity-40 flex items-center space-x-1">
<span class="text-[11px] text-[#52525B]">Powered by</span>
<span class="text-[11px] font-bold text-[#52525B] tracking-tight">Kedbyte</span>
</div>
</footer>
</main>
<script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerText = 'visibility_off';
      } else {
        passwordInput.type = 'password';
        eyeIcon.innerText = 'visibility';
      }
    }

    // Interactive vault entry feel
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => {
        // Subtle ambient response could go here
      });
    });
  </script>
</body></html>
