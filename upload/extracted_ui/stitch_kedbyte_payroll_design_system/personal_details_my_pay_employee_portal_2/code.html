<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Personal Details - Kedbyte Payroll</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#e7e1e3",
                        "inverse-surface": "#e5e2e1",
                        "primary-container": "#e6e2de",
                        "outline-variant": "#484740",
                        "on-tertiary": "#323031",
                        "on-secondary-container": "#b7b4b7",
                        "on-secondary": "#313032",
                        "surface": "#141313",
                        "primary-fixed-dim": "#c9c6c2",
                        "primary-fixed": "#e6e2de",
                        "on-tertiary-fixed": "#1d1b1d",
                        "on-secondary-fixed": "#1b1b1d",
                        "on-error-container": "#ffdad6",
                        "tertiary": "#ffffff",
                        "surface-bright": "#3a3938",
                        "on-tertiary-container": "#676365",
                        "inverse-on-surface": "#313030",
                        "surface-tint": "#c9c6c2",
                        "surface-container": "#201f1f",
                        "on-tertiary-fixed-variant": "#494648",
                        "surface-dim": "#141313",
                        "on-surface-variant": "#cac6bd",
                        "surface-container-lowest": "#0f0e0e",
                        "secondary-container": "#474649",
                        "secondary-fixed": "#e5e1e4",
                        "tertiary-fixed-dim": "#cac5c7",
                        "primary": "#ffffff",
                        "surface-container-high": "#2b2a29",
                        "on-primary-fixed": "#1c1b19",
                        "secondary": "#c8c6c8",
                        "surface-container-low": "#1c1b1b",
                        "on-error": "#690005",
                        "on-surface": "#e5e2e1",
                        "secondary-fixed-dim": "#c8c6c8",
                        "inverse-primary": "#605e5b",
                        "on-primary-fixed-variant": "#484744",
                        "on-background": "#e5e2e1",
                        "on-primary": "#31302e",
                        "tertiary-container": "#e7e1e3",
                        "on-primary-container": "#666461",
                        "surface-container-highest": "#363434",
                        "error": "#ffb4ab",
                        "error-container": "#93000a",
                        "background": "#141313",
                        "surface-variant": "#363434",
                        "on-secondary-fixed-variant": "#474649",
                        "outline": "#939188"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "element-gap": "12px",
                        "command-height": "44px",
                        "section-gap": "32px",
                        "row-height": "48px",
                        "container-gap": "64px",
                        "rail-width": "48px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "page-title": ["Inter"],
                        "data-sm": ["JetBrains Mono"],
                        "section-title": ["Inter"],
                        "body-main": ["Inter"],
                        "data-lg": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "label-caps": ["11px", { "lineHeight": "14px", "letterSpacing": "0.08em", "fontWeight": "600" }],
                        "page-title": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "data-sm": ["14px", { "lineHeight": "20px", "letterSpacing": "0px", "fontWeight": "500" }],
                        "section-title": ["13px", { "lineHeight": "16px", "letterSpacing": "0.06em", "fontWeight": "500" }],
                        "body-main": ["15px", { "lineHeight": "24px", "letterSpacing": "0px", "fontWeight": "400" }],
                        "data-lg": ["28px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #0C0C0E; }
        /* The Void and the Pearl */
        .pearl-btn {
            background-color: #E8E4E0;
            color: #0C0C0E;
            transition: all 0.2s ease;
        }
        .pearl-btn:hover {
            opacity: 0.9;
        }
        .ghost-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(245, 245, 245, 0.08);
            border-radius: 0;
            color: #e5e2e1;
            padding: 8px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }
        .ghost-input:focus {
            outline: none;
            border-bottom-color: #E8E4E0;
            box-shadow: none;
        }
        .ghost-input:disabled {
            color: #52525B;
            border-bottom-color: transparent;
        }
        /* Hide nav shell on transactional/detail view */
    </style>
</head>
<body class="text-on-background font-body-main antialiased min-h-screen flex justify-center">
<main class="w-full max-w-2xl px-6 py-24 md:py-32">
<!-- HEADER -->
<header class="mb-container-gap flex flex-col gap-2">
<a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group mb-4 w-fit" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="font-label-caps text-label-caps uppercase">Back</span>
</a>
<h1 class="font-page-title text-page-title text-primary">Personal Details</h1>
<p class="font-data-sm text-data-sm text-[#52525B]">Last updated: 12 Dec 2025</p>
</header>
<div class="space-y-container-gap">
<!-- BASIC INFO SECTION -->
<section class="space-y-section-gap">
<h2 class="font-section-title text-section-title text-on-surface-variant uppercase tracking-widest border-b border-white/5 pb-2">Identity &amp; Contact</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-[#52525B] uppercase">Full Name</label>
<input class="ghost-input" disabled="" type="text" value="John Smith"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-[#52525B] uppercase">Date of Birth</label>
<input class="ghost-input" disabled="" type="text" value="15 Apr 1985"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-[#52525B] uppercase">NI Number</label>
<input class="ghost-input" disabled="" type="text" value="AB****56C"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-[#52525B] uppercase">Tax Code</label>
<input class="ghost-input" disabled="" type="text" value="1257L"/>
</div>
<div class="flex flex-col gap-1 mt-4">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Email</label>
<input class="ghost-input" type="email" value="john.smith@example.com"/>
</div>
<div class="flex flex-col gap-1 mt-4">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Phone</label>
<input class="ghost-input" type="tel" value="+44 7700 900077"/>
</div>
</div>
</section>
<!-- ADDRESS SECTION -->
<section class="space-y-section-gap">
<h2 class="font-section-title text-section-title text-on-surface-variant uppercase tracking-widest border-b border-white/5 pb-2">Primary Residence</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Address Line 1</label>
<input class="ghost-input" type="text" value="124 Concourse Way"/>
</div>
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Address Line 2</label>
<input class="ghost-input" type="text" value="Apt 4B"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">City</label>
<input class="ghost-input" type="text" value="London"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Postcode</label>
<input class="ghost-input" type="text" value="E1 6AN"/>
</div>
</div>
<button class="pearl-btn font-label-caps text-label-caps uppercase px-6 h-command-height mt-4 flex items-center justify-center">
                    Update Address
                </button>
</section>
<!-- EMERGENCY CONTACT -->
<section class="space-y-section-gap">
<div class="flex justify-between items-end border-b border-white/5 pb-2">
<h2 class="font-section-title text-section-title text-on-surface-variant uppercase tracking-widest">Emergency Contact</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Name</label>
<input class="ghost-input" type="text" value="Sarah Smith"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Relationship</label>
<input class="ghost-input" type="text" value="Spouse"/>
</div>
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Phone</label>
<input class="ghost-input" type="tel" value="+44 7700 900123"/>
</div>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors font-label-caps text-label-caps uppercase border border-white/10 h-command-height px-6 flex items-center justify-center gap-2 mt-4">
<span class="material-symbols-outlined text-[16px]">add</span> Add Contact
                </button>
</section>
<!-- BANK DETAILS -->
<section class="space-y-section-gap relative">
<div class="flex justify-between items-end border-b border-white/5 pb-2">
<h2 class="font-section-title text-section-title text-on-surface-variant uppercase tracking-widest">Banking</h2>
<div class="flex items-center gap-1.5 text-[#4ADE80]">
<span class="material-symbols-outlined text-[14px]">shield_lock</span>
<span class="font-label-caps text-label-caps uppercase">Encrypted</span>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Account Holder</label>
<input class="ghost-input" type="text" value="MR J SMITH"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Sort Code</label>
<input class="ghost-input" type="text" value="20-04-15"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Account Number</label>
<input class="ghost-input" type="text" value="****4421"/>
</div>
</div>
<button class="pearl-btn font-label-caps text-label-caps uppercase px-6 h-command-height mt-4 flex items-center justify-center">
                    Update Bank Details
                </button>
</section>
<!-- PENSION (Read-only) -->
<section class="space-y-section-gap">
<h2 class="font-section-title text-section-title text-on-surface-variant uppercase tracking-widest border-b border-white/5 pb-2">Pension Setup</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-caps text-label-caps text-[#52525B] uppercase">Scheme</label>
<input class="ghost-input" disabled="" type="text" value="NEST Workplace Pension"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-[#52525B] uppercase">Employee Contribution</label>
<input class="ghost-input" disabled="" type="text" value="5.0%"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-[#52525B] uppercase">Employer Contribution</label>
<input class="ghost-input" disabled="" type="text" value="3.0%"/>
</div>
</div>
</section>
</div>
</main>
</body></html>
